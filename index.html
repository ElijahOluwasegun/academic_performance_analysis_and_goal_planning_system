<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cavendish Exam and Goal Portal</title>
    <link rel="stylesheet" href="css/stylesheet.css">
</head>
<body>
    <header>
        <h1>CAVENDISH UNIVERSITY</h1>
        <h2>Academic Performance and Goal Planning</h2>
    </header>
    <main>
        <form action="">
            <label class="student_email" for="email">Student Email:</label>
            <input type="email" name="Email" id="email" placeholder="aa@students.cavendish.ac.ug" required>
            <label class="student_password" for="password">Password:</label>
            <input type="password" name="Password" id="password" required>
            <button type="submit" name="Submit">Log In</button>
        </form>
    </main>
    <footer></footer>
</body>
</html>
